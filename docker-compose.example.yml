version: '3.9'
services:
  switchbot-mcp:
    build: .
    ports:
      - "3030:3030"
    environment:
      SWITCHBOT_TOKEN: ${SWITCHBOT_TOKEN}
      SWITCHBOT_SECRET: ${SWITCHBOT_SECRET}
      SWITCHBOT_MCP_TOKEN: ${SWITCHBOT_MCP_TOKEN:-changeme}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command: mcp serve --port 3030 --bind 0.0.0.0 --auth-token ${SWITCHBOT_MCP_TOKEN:-changeme}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3030/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
